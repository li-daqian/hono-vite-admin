name: Deploy Vercel production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-vercel-production
  cancel-in-progress: false

jobs:
  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://quality_gate:quality_gate@localhost:5432/quality_gate?schema=public
      FRONTEND_DOMAIN: ${{ vars.FRONTEND_DOMAIN || 'http://localhost:5173' }}
      READ_ONLY_MODE: ${{ vars.READ_ONLY_MODE || 'false' }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'http://localhost:3000' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.x

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check types
        run: pnpm check-types

      - name: Run server unit tests
        run: pnpm --filter @hono-vite-admin/server test:unit

      - name: Run admin unit tests
        run: pnpm --filter @hono-vite-admin/admin test:unit

      - name: Build admin
        run: pnpm --filter @hono-vite-admin/admin build

      - name: Build server Vercel bundle
        run: pnpm --filter @hono-vite-admin/server build:vercel

  deploy-server:
    name: Deploy server
    runs-on: ubuntu-latest
    needs:
      - quality-gate
    environment: production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      FRONTEND_DOMAIN: ${{ vars.FRONTEND_DOMAIN }}
      READ_ONLY_MODE: ${{ vars.READ_ONLY_MODE }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_SERVER_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply production migrations
        run: pnpm --filter @hono-vite-admin/server exec prisma migrate deploy

      - name: Pull Vercel project settings
        run: pnpm dlx vercel@latest pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Deploy to Vercel production
        run: |
          pnpm dlx vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN" \
            --build-env READ_ONLY_MODE="$READ_ONLY_MODE" \
            --build-env FRONTEND_DOMAIN="$FRONTEND_DOMAIN" \
            --build-env DATABASE_URL="$DATABASE_URL" \
            --env READ_ONLY_MODE="$READ_ONLY_MODE" \
            --env FRONTEND_DOMAIN="$FRONTEND_DOMAIN" \
            --env DATABASE_URL="$DATABASE_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_SERVER_PROJECT_ID }}

  deploy-admin:
    name: Deploy admin
    runs-on: ubuntu-latest
    needs:
      - deploy-server
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Pull Vercel project settings
        run: pnpm dlx vercel@latest pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Deploy admin to Vercel production
        run: |
          pnpm dlx vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN" \
            --build-env VITE_API_BASE_URL="$VITE_API_BASE_URL" \
            --env VITE_API_BASE_URL="$VITE_API_BASE_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
