name: Deploy server to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-vercel-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Migrate and deploy
    runs-on: ubuntu-latest
    environment: production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      FRONTEND_DOMAIN: ${{ vars.FRONTEND_DOMAIN }}
      READ_ONLY_MODE: ${{ vars.READ_ONLY_MODE }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_SERVER_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply production migrations
        run: pnpm --filter @hono-vite-admin/server exec prisma migrate deploy

      - name: Pull Vercel project settings
        working-directory: apps/server
        run: pnpm dlx vercel@latest pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Deploy to Vercel production
        working-directory: apps/server
        run: |
          pnpm dlx vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN" \
            --build-env READ_ONLY_MODE="$READ_ONLY_MODE" \
            --build-env FRONTEND_DOMAIN="$FRONTEND_DOMAIN" \
            --build-env DATABASE_URL="$DATABASE_URL" \
            --env READ_ONLY_MODE="$READ_ONLY_MODE" \
            --env FRONTEND_DOMAIN="$FRONTEND_DOMAIN" \
            --env DATABASE_URL="$DATABASE_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_SERVER_PROJECT_ID }}
